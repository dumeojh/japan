    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        /* 요미가나(후리가나)가 나타날 때 줄간격이 깨지지 않도록 부드러운 정렬 스타일 추가 */
        ruby { ruby-position: over; }
        rt { font-family: sans-serif; letter-spacing: -0.05em; padding-bottom: 2px; }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 md:p-8 select-none">

    <div class="bg-white shadow-2xl rounded-3xl max-w-xl w-full p-6 md:p-8 border border-slate-100 flex flex-col justify-between min-h-[600px]">
        
        <div class="text-center mb-6">
            <h2 class="text-2xl font-black text-slate-800 tracking-tight flex items-center justify-center gap-2">
                <span>🇯🇵</span> 일본어 마스터 학습기
            </h2>
        </div>

        <div class="grid grid-cols-3 gap-1.5 p-1.5 bg-slate-100 rounded-2xl mb-6">
            <button id="btn-mode-basic" onclick="changeMode('basic')" class="py-2.5 rounded-xl text-sm font-bold transition-all active:scale-95 shadow-sm">
                📘 기초
            </button>
            <button id="btn-mode-classroom" onclick="changeMode('classroom')" class="py-2.5 rounded-xl text-sm font-bold transition-all active:scale-95 shadow-sm">
                🏫 교실
            </button>
            <button id="btn-mode-drama" onclick="changeMode('drama')" class="py-2.5 rounded-xl text-sm font-bold transition-all active:scale-95 shadow-sm">
                🎬 드라마
            </button>
        </div>

        <div class="flex justify-between items-center px-2 mb-2 text-xs font-bold tracking-wide">
            <div id="mode" class="text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full">지정 모드</div>
            <div id="count" class="text-slate-400 bg-slate-100 px-3 py-1 rounded-full">0 / 0</div>
        </div>

        <div class="bg-gradient-to-b from-slate-50 to-white border-2 border-slate-100 rounded-2xl p-6 md:p-10 mb-6 flex-1 flex flex-col justify-center items-center relative shadow-sm">
            <div id="sentence" class="text-2xl md:text-3xl font-extrabold text-slate-800 leading-loose text-center mb-6 min-h-[5.5rem] flex items-center justify-center tracking-wide break-keep">
                Loading...
            </div>
            <div id="meaning" class="text-base md:text-lg font-medium text-slate-500 text-center border-t border-dashed border-slate-200 pt-4 w-full min-h-[2.5rem] flex items-center justify-center tracking-tight break-keep transition-opacity duration-300">
                의미 자리
            </div>
        </div>

        <div class="space-y-4">
            <div class="flex items-center justify-center gap-6">
                <button onclick="prev()" class="w-14 h-14 bg-slate-100 text-slate-700 hover:bg-slate-200 rounded-full flex items-center justify-center text-xl transition-all shadow-sm active:scale-90 font-bold">
                    ◀
                </button>
                <button onclick="speakNow()" class="w-20 h-20 bg-indigo-600 hover:bg-indigo-700 text-white rounded-full flex items-center justify-center text-3xl transition-all shadow-lg shadow-indigo-100 active:scale-95">
                    🔊
                </button>
                <button onclick="next()" class="w-14 h-14 bg-slate-100 text-slate-700 hover:bg-slate-200 rounded-full flex items-center justify-center text-xl transition-all shadow-sm active:scale-90 font-bold">
                    ▶
                </button>
            </div>

            <div class="grid grid-cols-3 gap-2 pt-2">
                <button onclick="toggleMeaning()" class="py-3 px-2 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 border border-emerald-100 rounded-xl text-xs md:text-sm font-bold transition-all active:scale-95 flex items-center justify-center gap-1 shadow-sm">
                    📖 뜻 토글
                </button>
                <button id="loopBtn" onclick="toggleLoop()" class="py-3 px-2 bg-amber-50 hover:bg-amber-100 text-amber-700 border border-amber-100 rounded-xl text-xs md:text-sm font-bold transition-all active:scale-95 flex items-center justify-center gap-1 shadow-sm">
                    🔁 반복 OFF
                </button>
                <button onclick="stopLoop()" class="py-3 px-2 bg-rose-50 hover:bg-rose-100 text-rose-700 border border-rose-100 rounded-xl text-xs md:text-sm font-bold transition-all active:scale-95 flex items-center justify-center gap-1 shadow-sm">
                    ⏹ 정지
                </button>
            </div>
        </div>

    </div>

        let currentData = basicData;
        let idx = 0;
        let showMeaning = true;
        let loop = false;
        let loopTimeout = null; // 루프 타이머 저장 객체

        // 🔤 한자(히라가나) 패턴을 가독성 높은 HTML ruby 태그로 변환해주는 파서 함수
        function parseRuby(text) {
            return text.replace(/([\u4e00-\u9fa5々〇]+)\(([^)]+)\)/g, '<ruby>$1<rt class="text-xs font-bold text-indigo-500 select-none pb-0.5 tracking-normal">$2</rt></ruby>');
        }

        function render() {
            // 요미가나가 예쁘게 적용되도록 innerHTML 처리
            document.getElementById("sentence").innerHTML = parseRuby(currentData[idx][0]);
            
            // 한글 번역 노출 제어
            const meaningEl = document.getElementById("meaning");
            meaningEl.textContent = showMeaning ? currentData[idx][1] : "";
            meaningEl.style.opacity = showMeaning ? "1" : "0";

            document.getElementById("count").textContent = (idx + 1) + " / " + currentData.length;
        }

        function speakNow() {
            window.speechSynthesis.cancel();
            if (loopTimeout) clearTimeout(loopTimeout);

            let u = new SpeechSynthesisUtterance(currentData[idx][2]);
            u.lang = "ja-JP";
            u.rate = 0.85; // 학생들이 똑또하게 듣기 좋은 안정적인 표준 속도 지정

            // 🔁 무한 반복 로직 강화: 말하기가 끝났을 때 반복 상태라면 자동으로 이어서 다음 스피치 호출
            u.onend = function() {
                if (loop) {
                    loopTimeout = setTimeout(() => {
                        if (loop) speakNow();
                    }, 800); // 0.8초 여유를 두고 자동 무한 루프 재생
                }
            };

            window.speechSynthesis.speak(u);
        }
            
        function next() {
            idx++;
            if (idx >= currentData.length) idx = 0;
            render();
            speakNow();
        }

        function prev() {
            idx--;
            if (idx < 0) idx = currentData.length - 1;
            render();
            speakNow();
        }

        function changeMode(mode) {
            idx = 0;
            
            // 모든 탭 버튼 스타일 초기화 (Tailwind 기반 유연화)
            const allModes = ['basic', 'classroom', 'drama'];
            allModes.forEach(m => {
                document.getElementById(`btn-mode-${m}`).className = "py-2.5 rounded-xl text-sm font-bold transition-all text-slate-600 hover:bg-slate-200";
            });

            // 선택된 탭에 강력한 하이라이팅 입히기
            const activeBtn = document.getElementById(`btn-mode-${mode}`);
            activeBtn.className = "py-2.5 rounded-xl text-sm font-bold transition-all bg-indigo-600 text-white shadow-md shadow-indigo-100";

            if (mode === "basic") {
                currentData = basicData;
                document.getElementById("mode").textContent = `📘 기초 일본어 (${basicData.length})`;
            } else if (mode === "classroom") {
                currentData = classroomData;
                document.getElementById("mode").textContent = `🏫 교실 회화 (${classroomData.length})`;
            } else if (mode === "drama") {
                currentData = dramaData;
                document.getElementById("mode").textContent = `🎬 드라마 대사 (${dramaData.length})`;
            }

            render();
            speakNow();
        }

        function toggleMeaning() {
            showMeaning = !showMeaning;
            render();
        }

        function toggleLoop() {
            loop = !loop;
            const loopBtn = document.getElementById("loopBtn");
            
            if (loop) {
                loopBtn.textContent = "🔁 반복 ON";
                loopBtn.className = "py-3 px-2 bg-amber-500 text-white border border-amber-500 rounded-xl text-xs md:text-sm font-bold transition-all active:scale-95 flex items-center justify-center gap-1 shadow-md";
                speakNow();
            } else {
                loopBtn.textContent = "🔁 반복 OFF";
                loopBtn.className = "py-3 px-2 bg-amber-50 hover:bg-amber-100 text-amber-700 border border-amber-100 rounded-xl text-xs md:text-sm font-bold transition-all active:scale-95 flex items-center justify-center gap-1 shadow-sm";
                if (loopTimeout) clearTimeout(loopTimeout);
                window.speechSynthesis.cancel();
            }
        }

        function stopLoop() {
            loop = false;
            if (loopTimeout) clearTimeout(loopTimeout);
            
            const loopBtn = document.getElementById("loopBtn");
            loopBtn.textContent = "🔁 반복 OFF";
            loopBtn.className = "py-3 px-2 bg-amber-50 hover:bg-amber-100 text-amber-700 border border-amber-100 rounded-xl text-xs md:text-sm font-bold transition-all active:scale-95 flex items-center justify-center gap-1 shadow-sm";
            
            window.speechSynthesis.cancel();
        }

        // 초기 시작값 로드
        changeMode("basic");
