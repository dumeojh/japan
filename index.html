<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>일본어 학습 앱</title>
<style>
body{font-family:sans-serif;max-width:900px;margin:auto;padding:15px;text-align:center}
button{padding:10px 15px;margin:4px}
.card{border:1px solid #ccc;border-radius:12px;padding:20px;margin-top:10px}
#jp{font-size:2rem;margin:15px}
#kr{font-size:1.2rem;color:#555}
</style>
</head>
<body>
<h2>일본어 학습 앱</h2>

<button onclick="changeMode('basic')">기초 일본어 100문장</button>
<button onclick="changeMode('classroom')">교실 회화 100문장</button>

<div id="count"></div>

<div class="card">
<div id="jp"></div>
<div id="kr"></div>
</div>

<div>
<button onclick="prev()">이전</button>
<button onclick="speak()">읽기</button>
<button onclick="next()">다음</button>
<button onclick="toggleMeaning()">뜻 숨기기</button>
<button onclick="quizMode()">퀴즈모드</button>
</div>

<script>
const basicData=[];
for(let i=1;i<=100;i++){
 basicData.push([`基礎文 ${i}` , `기초 일본어 문장 ${i}`]);
}

["生徒(せいと)：トイレに行(い)ってもいいですか。","학생: 화장실 가도 될까요?"],
["先生(せんせい)：はい、どうぞ。","선생님: 네, 다녀오세요."],

["先生(せんせい)：試験(しけん)を始(はじ)めます。","선생님: 시험을 시작하겠습니다."],

["生徒(せいと)：書(か)きました。","학생: 적었습니다."],
["先生(せんせい)：時間(じかん)は五十分(ごじゅっぷん)です。","선생님: 시간은 50분입니다."],
["生徒(せいと)：分(わ)かりました。","학생: 알겠습니다."],
["先生(せんせい)：始(はじ)めてください。","선생님: 시작하세요."],

["先生(せんせい)：試験(しけん)は終(お)わりです。","선생님: 시험 종료입니다."],
["生徒(せいと)：ありがとうございました。","학생: 감사합니다."],

["先生(せんせい)：今日(きょう)の授業(じゅぎょう)はここまでです。","선생님: 오늘 수업은 여기까지입니다."],
["生徒(せいと)：ありがとうございました。","학생: 감사합니다."],
["先生(せんせい)：また明日(あした)。","선생님: 내일 또 봅시다."],
["生徒(せいと)：さようなら。","학생: 안녕히 계세요."]

];

for(let i=3;i<=100;i++){
 classroomData.push([`教室会話 ${i}`,`교실 회화 ${i}`]);
}

let currentData=basicData;
let idx=0;
let showMeaning=true;

function render(){
 document.getElementById("jp").textContent=currentData[idx][0];
 document.getElementById("kr").textContent=showMeaning?currentData[idx][1]:"";
 document.getElementById("count").textContent=(idx+1)+" / "+currentData.length;
}
function changeMode(m){
 currentData=(m==="basic")?basicData:classroomData;
 idx=0; render();
}
function next(){idx=(idx+1)%currentData.length;render();}
function prev(){idx=(idx-1+currentData.length)%currentData.length;render();}
function toggleMeaning(){showMeaning=!showMeaning;render();}
function speak(){
 let u=new SpeechSynthesisUtterance(currentData[idx][0]);
 u.lang="ja-JP";
 speechSynthesis.speak(u);
}
function quizMode(){
 showMeaning=false;
 render();
}
render();
</script>
</body>
</html>
