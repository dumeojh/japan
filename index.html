<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>일본어 100문장</title>

<style>
body{
    font-family: sans-serif;
    max-width:700px;
    margin:auto;
    padding:20px;
    text-align:center;
}
.card{
    border:1px solid #ddd;
    border-radius:15px;
    padding:25px;
    margin-top:20px;
}
#jp{
    font-size:2rem;
    margin:20px 0;
}
#kr{
    font-size:1.2rem;
    color:#555;
}
button{
    padding:12px 18px;
    margin:5px;
    font-size:1rem;
}
progress{
    width:100%;
    height:20px;
}
</style>
</head>

<body>

<h2>기초 일본어 100문장</h2>

<progress id="progress" value="1" max="100"></progress>

<div id="count">1 / 100</div>

<div class="card">
    <div id="jp"></div>
    <div id="kr"></div>
</div>

<div>
    <button onclick="prev()">◀ 이전</button>
    <button onclick="speak()">🔊 읽기</button>
    <button onclick="next()">다음 ▶</button>
</div>

<div>
    <button onclick="toggleMeaning()">뜻 보기/숨기기</button>
    <button onclick="randomSentence()">랜덤</button>
    <button onclick="autoPlay()">자동재생</button>

while(data.length<100){
    data.push([
        "例文 " + data.length,
        "예문 " + data.length
    ]);
}

let idx=0;
let meaningVisible=true;

function show(){

    document.getElementById("jp").textContent=
        data[idx][0];

    document.getElementById("kr").textContent=
        meaningVisible ? data[idx][1] : "";

    document.getElementById("count").textContent=
        (idx+1)+" / "+data.length;

    document.getElementById("progress").value=
        idx+1;
}

function speak(){

    speechSynthesis.cancel();

    let u=new SpeechSynthesisUtterance(
        data[idx][0]
    );

    u.lang="ja-JP";
    u.rate=0.9;

    speechSynthesis.speak(u);
}

function next(){
    idx=(idx+1)%data.length;
    show();
}

function prev(){
    idx=(idx-1+data.length)%data.length;
    show();
}

function randomSentence(){
    idx=Math.floor(Math.random()*data.length);
    show();
}

function toggleMeaning(){
    meaningVisible=!meaningVisible;
    show();
}

let auto=false;
let timer=null;

function autoPlay(){

    if(!auto){

        auto=true;

        timer=setInterval(()=>{
            speak();
            next();
        },5000);

        alert("자동재생 시작");
    }
    else{

        auto=false;

        clearInterval(timer);

        alert("자동재생 종료");
    }
}

show();

</script>

</body>
</html>
