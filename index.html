
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>일본어 학습기</title>
<style>
body{font-family:sans-serif;max-width:800px;margin:auto;padding:20px;text-align:center}
button{padding:12px 18px;margin:5px;font-size:16px}
#sentence{font-size:2rem;margin:30px 0;padding:20px;border:1px solid #ccc;border-radius:12px}
</style>
 #meaning{
  font-size:1.3rem;
  color:#666;
  margin-top:10px;
}
</head>
<body>
<h2>일본어 학습기</h2>

<button onclick="changeMode('basic')">📘 기초 일본어 100문장</button>
<button onclick="changeMode('classroom')">🏫 교실 회화 100문장</button>
<button onclick="changeMode('drama')">🎬 드라마 대사 100문장</button>
 <button onclick="toggleMeaning()">
뜻 보기/숨기기
</button>

<div id="mode"></div>
<div id="count"></div>
<div id="sentence"></div>
 <div id="meaning"></div>

<button onclick="prev()">◀ 이전</button>
<button onclick="speakNow()">🔊 재생</button>
<button onclick="next()">다음 ▶</button>
<button onclick="toggleLoop()">⏯ 반복재생 ON/OFF</button>

<script>
const basicData=[["おはようございます。"],["こんにちは。"],["ありがとうございます。"]];
const classroomData=[["先生、おはようございます。"],["宿題を出してください。"],["質問があります。"]];
const dramaData=[["本当？"],["どうしたの？"],["大丈夫？"]];

let currentData=basicData;
let idx=0;
let loop=false;

function render(){
 document.getElementById("sentence").textContent=currentData[idx][0];
 document.getElementById("count").textContent=(idx+1)+" / "+currentData.length;
}

function speakNow(){
 speechSynthesis.cancel();
 let u=new SpeechSynthesisUtterance(currentData[idx][0]);
 u.lang="ja-JP";
 if(loop){
   u.onend=function(){
      if(loop){ setTimeout(speakNow,800); }
   }
 }
 speechSynthesis.speak(u);
}

function next(){
 idx=(idx+1)%currentData.length;
 render();
 speakNow();
}

function prev(){
 idx=(idx-1+currentData.length)%currentData.length;
 render();
 speakNow();
}

function toggleLoop(){
 loop=!loop;
 speechSynthesis.cancel();
 if(loop){ speakNow(); }
}

function changeMode(m){
 idx=0;
 if(m==="basic"){currentData=basicData; document.getElementById("mode").textContent="📘 기초 일본어";}
 if(m==="classroom"){currentData=classroomData; document.getElementById("mode").textContent="🏫 교실 회화";}
 if(m==="drama"){currentData=dramaData; document.getElementById("mode").textContent="🎬 드라마 대사";}
 render();
 speakNow();
}

let showMeaning = true;

function toggleMeaning(){
    showMeaning = !showMeaning;
    render();
}

function render(){

 document.getElementById("sentence").textContent =
     currentData[idx][0];

 document.getElementById("meaning").textContent =
     showMeaning ? currentData[idx][1] : "";

}


 
changeMode('basic');
</script>
</body>
</html>
